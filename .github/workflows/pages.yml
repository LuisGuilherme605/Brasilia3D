name: Deploy GitHub Pages

# Publica o site estático (HTML/CSS/JS na raiz) no GitHub Pages.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissões mínimas para o deploy do Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Garante que só um deploy rode por vez, sem cancelar o que está em andamento.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Liga o Pages automaticamente (enablement) e configura o build.
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # Envia a raiz do repositório como artefato do site.
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
